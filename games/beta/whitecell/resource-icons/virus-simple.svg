<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Virus icon">
  <defs>
    <mask id="virus-cutouts">
      <rect width="128" height="128" fill="black"/>
      <g fill="white">
        <circle cx="64" cy="64" r="34"/>
        <circle cx="64" cy="22" r="9"/>
        <circle cx="64" cy="106" r="9"/>
        <circle cx="22" cy="64" r="9"/>
        <circle cx="106" cy="64" r="9"/>
        <circle cx="34" cy="34" r="8"/>
        <circle cx="94" cy="34" r="8"/>
        <circle cx="34" cy="94" r="8"/>
        <circle cx="94" cy="94" r="8"/>
      </g>
      <g fill="black">
        <circle cx="51" cy="55" r="7"/>
        <circle cx="73" cy="50" r="6"/>
        <circle cx="78" cy="73" r="8"/>
        <circle cx="55" cy="80" r="5"/>
        <circle cx="43" cy="68" r="4"/>
        <circle cx="88" cy="60" r="4"/>
      </g>
    </mask>
    <filter id="virus-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="none"/>
  <g mask="url(#virus-cutouts)" filter="url(#virus-glow)">
    <rect width="128" height="128" fill="#fff"/>
  </g>
</svg>
