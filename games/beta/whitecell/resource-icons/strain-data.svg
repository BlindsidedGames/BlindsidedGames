      <rect x="27" y="17" width="74" height="94" rx="10" fill="white"/>
      <rect x="39" y="29" width="50" height="70" rx="5" fill="black"/>
      <g fill="white">
        <rect x="45" y="36" width="38" height="8" rx="4"/>
        <rect x="45" y="84" width="38" height="8" rx="4"/>
        <circle cx="64" cy="64" r="20"/>
      </g>
      <g fill="black">
        <path d="M55 47c12 7 18 17 18 29 0 6-3 9-7 6-8-6-12-15-12-27 0-5-4-8 1-8Z"/>
        <path d="M73 47c-12 7-18 17-18 29 0 6 3 9 7 6 8-6 12-15 12-27 0-5 4-8-1-8Z"/>
      </g>
      <g fill="white">
        <rect x="54" y="52" width="20" height="5" rx="2.5"/>
        <rect x="53" y="63" width="22" height="5" rx="2.5"/>
        <rect x="54" y="74" width="20" height="5" rx="2.5"/>
      </g>
      <g fill="white">
