<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Idle Dyson Swarm promo artwork</title>
  <desc id="desc">A star surrounded by orbital collectors.</desc>
  <defs>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff6b0"/>
      <stop offset=".45" stop-color="#f9a642"/>
      <stop offset="1" stop-color="#f36b2d" stop-opacity=".08"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07121e"/>
      <stop offset="1" stop-color="#151d33"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <circle cx="610" cy="276" r="132" fill="url(#star)"/>
  <ellipse cx="610" cy="276" rx="260" ry="104" fill="none" stroke="#77c8ff" stroke-opacity=".36" stroke-width="9"/>
  <ellipse cx="610" cy="276" rx="318" ry="142" fill="none" stroke="#ffffff" stroke-opacity=".16" stroke-width="5"/>
  <g fill="#dff5ff">
    <rect x="348" y="246" width="34" height="18" rx="3"/>
    <rect x="488" y="173" width="34" height="18" rx="3"/>
    <rect x="724" y="355" width="34" height="18" rx="3"/>
    <rect x="830" y="272" width="34" height="18" rx="3"/>
  </g>
  <text x="44" y="84" fill="#ffffff" font-family="Arial, sans-serif" font-size="50" font-weight="900">Idle Dyson Swarm</text>
  <text x="46" y="128" fill="#a9c7dd" font-family="Arial, sans-serif" font-size="24" font-weight="700">harvest the star</text>
</svg>
