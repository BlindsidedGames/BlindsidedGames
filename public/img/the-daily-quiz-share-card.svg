  <text x="278" y="188" fill="#9ed0ff" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="4">APP CLIP READY</text>
  <text x="278" y="284" fill="#f4f7fb" font-family="Sora, Arial, sans-serif" font-size="76" font-weight="800">The Daily Quiz</text>
  <text x="278" y="352" fill="#d6e5fa" font-family="Manrope, Arial, sans-serif" font-size="32" font-weight="600">Daily challenges, shared quiz packs, and fast starts on iPhone.</text>
  <text x="278" y="432" fill="#b4c3db" font-family="Manrope, Arial, sans-serif" font-size="26">Open from Safari, Messages, or the App Clip experience.</text>

  <g transform="translate(278 468)">
