<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The Daily Quiz</title>
  <desc id="desc">A polished trivia experience by Blindsided Games, featuring daily challenges, shared quiz packs, and instant App Clip starts on iPhone.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111a2c"/>
      <stop offset="100%" stop-color="#09101c"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="16%" r="45%">
      <stop offset="0%" stop-color="#4aa9ff" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#4aa9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="84%" r="38%">
      <stop offset="0%" stop-color="#3fe5be" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#3fe5be" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g opacity="0.16">
    <path d="M0 88h1200" stroke="#7bc4ff" stroke-width="1"/>
    <path d="M0 542h1200" stroke="#7bc4ff" stroke-width="1"/>
    <path d="M86 0v630" stroke="#7bc4ff" stroke-width="1"/>
    <path d="M1114 0v630" stroke="#7bc4ff" stroke-width="1"/>
  </g>

  <rect x="82" y="78" width="1036" height="474" rx="40" fill="url(#panel)" stroke="rgba(173,205,255,0.18)"/>

  <g transform="translate(130 137)">
    <rect x="0" y="0" width="118" height="118" rx="30" fill="#08111f" stroke="rgba(255,255,255,0.12)"/>
    <rect x="14" y="14" width="90" height="90" rx="24" fill="url(#bg)" stroke="rgba(255,255,255,0.09)"/>
    <path d="M58 32c16 0 28 12 28 28 0 10-4 17-10 24l-18 18L40 84c-6-7-10-14-10-24 0-16 12-28 28-28z" fill="#49a4ff"/>
