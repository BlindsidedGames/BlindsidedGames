    <rect x="218" y="0" width="202" height="54" rx="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <rect x="436" y="0" width="234" height="54" rx="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="101" y="35" text-anchor="middle" fill="#f4f7fb" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="700">10-question demo</text>
    <text x="319" y="35" text-anchor="middle" fill="#f4f7fb" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="700">Share-friendly links</text>
    <text x="553" y="35" text-anchor="middle" fill="#f4f7fb" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="700">Blindsided Games</text>
